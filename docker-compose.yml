services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: whatsapp_digest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cria database separado para a Evolution API na inicialização
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:v1.8.7
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      # Auth
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme-evolution-key}
      # Database (Evolution API usa seu próprio schema)
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:postgres@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      # Redis
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_TTL: '604800'
      # Configurações de instância
      DEL_TEMP_INSTANCES: 'false'
      DEL_INSTANCE: 'false'
      # Webhooks globais desligados — cada instância configura o próprio
      WEBHOOK_GLOBAL_ENABLED: 'false'
      WEBHOOK_GLOBAL_URL: ''
      # CORS
      CORS_ORIGIN: '*'
      CORS_METHODS: 'GET,POST,PUT,DELETE'
      CORS_CREDENTIALS: 'true'
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  evolution_data:
