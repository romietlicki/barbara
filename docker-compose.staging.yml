
# Stack completa para staging/VPS — inclui infra + aplicações
# Uso: docker compose -f docker-compose.staging.yml up -d
# Pré-requisito: copie .env.example para .env e preencha todas as variáveis

services:
  # ─── Infra ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_digest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: ${EVOLUTION_PUBLIC_URL:?EVOLUTION_PUBLIC_URL obrigatório}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:?EVOLUTION_API_KEY obrigatório}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      CACHE_REDIS_TTL: '604800'
      DEL_TEMP_INSTANCES: 'false'
      DEL_INSTANCE: 'false'
      WEBHOOK_GLOBAL_ENABLED: 'false'
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Aplicações ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/whatsapp_digest
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET obrigatório}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY obrigatório}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET:?obrigatório}
      EVOLUTION_WEBHOOK_BASE_URL: ${EVOLUTION_WEBHOOK_BASE_URL:?obrigatório}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?obrigatório}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?obrigatório}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?obrigatório}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      API_PORT: '3001'
      API_HOST: '0.0.0.0'
      LOG_LEVEL: info
      CORS_ORIGIN: ${NEXT_PUBLIC_APP_URL:?obrigatório}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/whatsapp_digest
      AUTH_SECRET: ${AUTH_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      INTERNAL_API_URL: http://api:3001
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:?obrigatório}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:?obrigatório}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Migrações (roda uma vez e encerra) ────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: >
      sh -c "npx prisma migrate deploy --schema packages/db/prisma/schema.prisma"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/whatsapp_digest
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

volumes:
  postgres_data:
  redis_data:
  evolution_data:
